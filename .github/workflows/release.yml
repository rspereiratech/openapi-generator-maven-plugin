name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Checkout parent POM
        uses: actions/checkout@v4
        with:
          repository: rspereiratech/openapi-generator-parent
          path: openapi-generator-parent
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install parent POM
        run: mvn install -f openapi-generator-parent/pom.xml -DskipTests

      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: rspereiratech/openapi-generator-core
          path: openapi-generator-core
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install core
        run: mvn install -f openapi-generator-core/pom.xml -DskipTests

      - name: Publish to Maven Central
        run: mvn --no-transfer-progress deploy -P release -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
